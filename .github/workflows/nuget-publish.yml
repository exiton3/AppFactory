name: Release Package Version
on:
  push:
    tags:
      - "v*.*.*"  # Only trigger on semantic version tags (v10.1.0, v10.2.0-beta, etc.)

jobs:
  unit_tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Install dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Unit Tests
        run: dotnet test --no-restore --verbosity normal --filter "Category!=Acceptance"

  deploy:
    needs: unit_tests
    if: github.event.base_ref == 'refs/heads/master'
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        project:
         - AppFactory.Framework.Domain
         - AppFactory.Framework.DependencyInjection
         - AppFactory.Framework.Logging.Abstractions
         - AppFactory.Framework.Logging.Serilog
         - AppFactory.Framework.Logging.MicrosoftExtensions
         - AppFactory.Framework.Logging
         - AppFactory.Framework.Application
         - AppFactory.Framework.Shared
         - AppFactory.Framework.Messaging
         - AppFactory.Framework.Messaging.Core
         - AppFactory.Framework.Messaging.Aws
         - AppFactory.Framework.Messaging.Azure
         - AppFactory.Framework.EventBus
         - AppFactory.Framework.EventBus.Aws
         - AppFactory.Framework.EventBus.Azure
         - AppFactory.Framework.TestExtensions
         - AppFactory.Framework.DataAccess
         - AppFactory.Framework.DataAccess.DynamoDB
         - AppFactory.Framework.DataAccess.CosmosDB
         - AppFactory.Framework.Api
         - AppFactory.Framework.Api.Aws
         - AppFactory.Framework.Api.Azure
         - AppFactory.Framework.Api.AspNetCore

    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Build all projects first to ensure project references are resolved correctly
      - name: Restore all dependencies
        run: dotnet restore

      - name: Build all projects
        run: dotnet build --configuration Release --no-restore

      # Pack the specific project (use --no-build to use already built assemblies)
      - name: Pack ${{ matrix.project }}       
        run: |
          dotnet pack ./src/${{ matrix.project }}/${{ matrix.project }}.csproj \
            --configuration Release \
            --no-build \
            -p:PackageVersion='${{ steps.version.outputs.version }}' \
            --output packages
  
      - name: Publish ${{ matrix.project }} package
        run: |
          dotnet nuget push packages/*.nupkg \
            --source 'https://api.nuget.org/v3/index.json' \
            --api-key ${{secrets.NUGET_APIKEY}} \
            --skip-duplicate

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}.v${{ steps.version.outputs.version }}
          path: packages/
          retention-days: 30
